<div>

    <div class='mt-10'>
        <app-navbar></app-navbar>
    </div>

    <div class='container mx-auto w-1/4 mt-40'>

        <form class='bg-black text-white rounded-3xl p-10'>

            <h1 class='text-5xl font-semibold text-center'>Añadir Actividad</h1>

            <div class='mt-10'>
                <label for='name' class='block mb-2 text-sm font-medium'>Título</label>
                <input type='text' id='name' name='name' class='bg-gray-700 border border-gray-600 text-sm rounded-lg block w-full p-2.5' placeholder='Tempo Run'>
            </div>

            <div class='mt-10'>
                <label for='description' class='block mb-2 text-sm font-medium'>Descripción</label>
                <input type='text' id='description' name='description' class='bg-gray-700 border border-gray-600 text-sm rounded-lg block w-full p-2.5' placeholder='Entrenamiento específico para la maratón'>
            </div>

            <div class='mt-10'>
                <label for='images' class='block mb-2 text-sm font-medium'>Añadir imágenes</label>
                <input type='file' id='images' name='images' class='bg-gray-700 border border-gray-600 text-sm rounded-lg block w-full p-2.5 cursor-pointer'>
            </div>

           <div class='grid grid-cols-2 mt-10'>
                <div class='mr-10'>
                    <label for='distance' class='block mb-2 text-sm font-medium'>Distancia</label>
                    <input type='text' id='distance' name='distance' class='bg-gray-700 border border-gray-600 text-sm rounded-lg block w-full p-2.5' placeholder='10,03'>
                </div>
                <div class='ml-10'>
                    <label for='time' class='block mb-2 text-sm font-medium'>Tiempo</label>
                    <input type='text' id='time' name='time' class='bg-gray-700 border border-gray-600 text-sm rounded-lg block w-full p-2.5' placeholder='49:58'>
                </div>
           </div>

           <div class='grid grid-cols-2 mt-10'>
            <div class='mr-10'>
                <label for='effort' class='block mb-2 text-sm font-medium'>Esfuerzo</label>
                <select id='effort' name='effort' class='bg-gray-700 border border-gray-600 text-sm rounded-lg block w-full p-2.5'>
                    <option value='bajo' selected>Bajo</option>
                    <option value='medio'>Medio</option>
                    <option value='alto'>Alto</option>
                </select>
            </div>
            <div class='ml-10'>
                <label for='shoes' class='block mb-2 text-sm font-medium'>Zapatillas</label>
                <select id='shoes' name='shoes' class='bg-gray-700 border border-gray-600 text-sm rounded-lg block w-full p-2.5'>
                    <option value='hoka' selected>Hoka Clifton 9</option>
                    <option value='takumi'>Adidas Adizero Takumi Sen 10</option>
                    <option value='boston'>Adidas Boston 12</option>
                </select>
            </div>
       </div>

           <div class='flex justify-center mt-14'>
                <button type='submit' class='text-xl font-medium bg-blue-700 hover:bg-blue-800 rounded-xl px-10 py-2'>Enviar</button>
           </div>

        </form>

    </div>

</div>
